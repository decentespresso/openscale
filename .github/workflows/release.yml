name: Release firmware

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on main)"
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main

      - name: Verify tag and checkout release commit
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: tag must match vX.Y.Z or X.Y.Z"
            exit 1
          fi
          git fetch --force --tags origin
          git fetch --force origin main:refs/remotes/origin/main
          if ! TAG_COMMIT="$(git rev-parse --verify --end-of-options "refs/tags/$TAG^{commit}")"; then
            echo "Error: tag $TAG does not exist"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "Error: tag $TAG is not reachable from main"
            exit 1
          fi
          git checkout --detach "$TAG_COMMIT"
          for publicKey in keys/ota/hds_ota_manifest_public_key_{1..3}.pem; do
            if [ ! -f "$publicKey" ]; then
              echo "Error: tag $TAG predates the three-key OTA migration"
              exit 1
            fi
          done
          if ! grep -Fq "HDS_FIRMWARE_VERSION" git_rev_macro.py || ! grep -Fq "HDS_FIRMWARE_VERSION" include/config.h; then
            echo "Error: tag $TAG predates the release version injection migration"
            exit 1
          fi
          echo "HDS_FIRMWARE_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          # Key on platformio.ini so a platform/lib pin change busts the cache.
          # A static key froze CI on a stale cached `stable` platform zip (3.3.8)
          # even after the pin should have resolved a newer framework.
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Configure OTA manifest public keys
        run: python tools/write_ota_public_key_header.py

      - name: Build PlatformIO Project
        run: |
          set -euo pipefail
          pio run -e esp32s3 || exit 1
          if ! grep -aFq "FW: $HDS_FIRMWARE_VERSION" .pio.nosync/build/esp32s3/firmware.bin; then
            echo "Error: firmware does not contain version $HDS_FIRMWARE_VERSION"
            exit 1
          fi
          pio run -e esp32s3 -t buildfs || exit 1

      - name: Prepare release assets
        env:
          TAG: ${{ github.event.inputs.tag }}
          HDS_RELEASE_TAG: ${{ github.event.inputs.tag }}
          HDS_RELEASE_REPOSITORY: ${{ github.repository }}
          HDS_RELEASE_MIN_FROM: ${{ vars.HDS_RELEASE_MIN_FROM || '3.0.0' }}
          HDS_OTA_SIGNING_KEY_PEM: ${{ secrets.HDS_OTA_SIGNING_KEY_PEM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          verifyManifestSignature() {
            for publicKey in keys/ota/hds_ota_manifest_public_key_{1..3}.pem; do
              if openssl dgst -sha256 -verify "$publicKey" -signature "$2" "$1"; then
                return 0
              fi
            done
            return 1
          }
          if [ -z "${HDS_OTA_SIGNING_KEY_PEM:-}" ]; then
            echo "Error: HDS_OTA_SIGNING_KEY_PEM secret is required"
            exit 1
          fi
          mkdir -p release-files legacy-files
          cp ".pio.nosync/build/esp32s3/firmware.bin" release-files/
          cp ".pio.nosync/build/esp32s3/littlefs.bin" release-files/
          for file in firmware.bin bootloader.bin partitions.bin littlefs.bin; do
            if [ ! -f ".pio.nosync/build/esp32s3/$file" ]; then
              echo "Error: File .pio.nosync/build/esp32s3/$file not found"
              exit 1
            fi
            cp ".pio.nosync/build/esp32s3/$file" legacy-files/
          done
          PREVIOUS_MANIFEST_ARGS=()
          PREVIOUS_TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')"
          if [ -n "$PREVIOUS_TAG" ]; then
            mkdir -p previous-release
            gh release download "$PREVIOUS_TAG" --repo "$GITHUB_REPOSITORY" --pattern manifest.json --dir previous-release || true
            gh release download "$PREVIOUS_TAG" --repo "$GITHUB_REPOSITORY" --pattern manifest.sig --dir previous-release || true
            if [ -f previous-release/manifest.json ] || [ -f previous-release/manifest.sig ]; then
              if [ ! -f previous-release/manifest.json ] || [ ! -f previous-release/manifest.sig ]; then
                echo "Error: previous OTA catalog is incomplete"
                exit 1
              fi
              verifyManifestSignature previous-release/manifest.json previous-release/manifest.sig
              PREVIOUS_MANIFEST_ARGS=(--previous-manifest previous-release/manifest.json)
            fi
          fi
          python tools/generate_release_manifest.py --tag "$TAG" --output-dir release-files --catalog --catalog-min-version v3.1.13 "${PREVIOUS_MANIFEST_ARGS[@]}"
          if [ ! -f release-files/manifest.sig ]; then
            echo "Error: manifest.sig not generated"
            exit 1
          fi
          verifyManifestSignature release-files/manifest.json release-files/manifest.sig
          cd legacy-files
          zip "../HDS_FW_${TAG}.zip" ./* || exit 1
          cd ..
      - name: Create draft release
        env:
          TAG: ${{ github.event.inputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --draft \
            --title="$TAG" \
            --generate-notes \
            "HDS_FW_${TAG}.zip" \
            release-files/firmware.bin \
            release-files/littlefs.bin
          gh release upload "$TAG" release-files/manifest.sig
          gh release upload "$TAG" release-files/manifest.json
          gh release view "$TAG" --json assets --jq '.assets[].name' > release-assets.txt
          grep -Fx firmware.bin release-assets.txt
          grep -Fx littlefs.bin release-assets.txt
          grep -Fx manifest.json release-assets.txt
          grep -Fx manifest.sig release-assets.txt
          gh release edit "$TAG" --draft=false
