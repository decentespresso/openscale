
name: Build firmware

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ai-documentation:
    name: AI documentation contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: python tools/test_ai_docs_contract.py

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - esp32s3

    steps:
      - uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          # Key on platformio.ini so a platform/lib pin change busts the cache.
          # A static key froze CI on a stale cached `stable` platform zip (3.3.8)
          # even after the pin should have resolved a newer framework.
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'requirements-platformio.txt') }}
      - uses: actions/setup-node@v4.1.0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: python -m pip install --requirement requirements-platformio.txt

      - name: Build PlatformIO Project
        run: |
          pio run -e ${{ matrix.board }} 
          pio run -e ${{ matrix.board }} -t buildfs
          pio --version > .pio.nosync/build/${{ matrix.board }}/dependencies.txt
          pio pkg list -e ${{ matrix.board }} >> .pio.nosync/build/${{ matrix.board }}/dependencies.txt

      - name: Assert vendored partition table matches framework
        run: |
          VENDORED=partitions/default_8MB.csv
          UPSTREAM=~/.platformio/packages/framework-arduinoespressif32/tools/partitions/default_8MB.csv
          if ! diff "$VENDORED" "$UPSTREAM" > /dev/null 2>&1; then
            echo "::warning::Vendored $VENDORED differs from the framework-owned default_8MB.csv."
            echo "This may be intentional (we pinned to an older layout) or the framework"
            echo "has changed its partition table. Review the diff and decide whether to"
            echo "update the vendored copy:"
            diff "$VENDORED" "$UPSTREAM" || true
          else
            echo "Vendored partition table matches framework default_8MB.csv."
          fi

      - name: "Run slugify"
        id: slugify
        uses: eltimn/slugify-action@v2.0.2

      - name: Save firmware file
        uses: actions/upload-artifact@v4
        with:
          name: HDS-snapshot-${{steps.slugify.outputs.sha}}
          path: |
            .pio.nosync/build/${{ matrix.board }}/firmware.bin
            .pio.nosync/build/${{ matrix.board }}/bootloader.bin
            .pio.nosync/build/${{ matrix.board }}/partitions.bin
            .pio.nosync/build/${{ matrix.board }}/littlefs.bin

      - name: Save dependency inventory
        uses: actions/upload-artifact@v4
        with:
          name: HDS-dependencies-${{steps.slugify.outputs.sha}}
          path: .pio.nosync/build/${{ matrix.board }}/dependencies.txt
